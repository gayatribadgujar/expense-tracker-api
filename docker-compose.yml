version: '3.8'

services:
  db:
    image: postgres:15
    container_name: expense_tracker_db
    environment:
      POSTGRES_USER: adm
      POSTGRES_PASSWORD: password
      POSTGRES_DB: expense_tracker_dev_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: expense_tracker_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://adm:password@db:5432/expense_tracker_dev_db

volumes:
  postgres_data:
