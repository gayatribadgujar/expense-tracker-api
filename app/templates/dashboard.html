<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }

        .expense-card {
            border: 1px solid #ccc;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            background: #fafafa;
        }

        .actions button {
            width: auto;
            margin-right: 10px;
        }

        .report-box {
            border: 1px solid #ccc;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            background: #eef7ff;
        }

        .pagination button {
            width: auto;
            margin-right: 10px;
        }

        #msg {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Expense Dashboard</h1>

        <p id="userInfo"></p>
        <button onclick="logoutUser()">Logout</button>

        <h2>Add Expense</h2>
        <input type="text" id="title" placeholder="Title">
        <input type="number" id="amount" placeholder="Amount">
        <input type="text" id="category" placeholder="Category">
        <input type="text" id="description" placeholder="Description">
        <button onclick="addExpense()">Add Expense</button>

        <p id="msg"></p>

        <h2>My Expenses</h2>
        <button onclick="loadExpenses()">Load Expenses</button>

        <div class="pagination">
            <button onclick="prevPage()">Previous</button>
            <span id="pageInfo">Page 1</span>
            <button onclick="nextPage()">Next</button>
        </div>

        <div id="expenseList"></div>

        <h2>My Report</h2>
        <button onclick="loadReport()">Load Report</button>
        <div id="reportSection"></div>
    </div>

    <script>
        let currentPage = 1;
        const limit = 5;

        const token = localStorage.getItem("access_token");
        const userEmail = localStorage.getItem("user_email");

        if (!token) {
            window.location.href = "/login-page";
        }

        document.getElementById("userInfo").innerHTML =
            "Logged in as: " + userEmail;

        function authHeaders() {
            return {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            };
        }

        function logoutUser() {
            localStorage.removeItem("access_token");
            localStorage.removeItem("user_email");
            window.location.href = "/login-page";
        }

        async function addExpense() {
            const msg = document.getElementById("msg");

            const response = await fetch("/expenses/", {
                method: "POST",
                headers: authHeaders(),
                body: JSON.stringify({
                    title: document.getElementById("title").value,
                    amount: parseFloat(document.getElementById("amount").value),
                    category: document.getElementById("category").value,
                    description: document.getElementById("description").value
                })
            });

            const data = await response.json();

            if (response.ok) {
                msg.innerHTML = "Expense Added!";
                msg.style.color = "green";

                document.getElementById("title").value = "";
                document.getElementById("amount").value = "";
                document.getElementById("category").value = "";
                document.getElementById("description").value = "";

                currentPage = 1;
                loadExpenses();
                loadReport();
            } else {
                msg.innerHTML = "Error: " + JSON.stringify(data);
                msg.style.color = "red";
            }
        }

        async function loadExpenses() {
            const res = await fetch(`/expenses/?page=${currentPage}&limit=${limit}`, {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const data = await res.json();

            const list = document.getElementById("expenseList");
            list.innerHTML = "";

            if (!Array.isArray(data) || data.length === 0) {
                list.innerHTML = "<p>No expenses found.</p>";
                document.getElementById("pageInfo").innerText = `Page ${currentPage}`;
                return;
            }

            data.forEach(exp => {
                const div = document.createElement("div");
                div.className = "expense-card";

                div.innerHTML = `
                    <p><strong>ID:</strong> ${exp.id}</p>
                    <p><strong>Title:</strong> ${exp.title}</p>
                    <p><strong>Amount:</strong> ₹${exp.amount}</p>
                    <p><strong>Category:</strong> ${exp.category}</p>
                    <p><strong>Description:</strong> ${exp.description || ""}</p>
                    <div class="actions">
                        <button onclick="editExpense(${exp.id}, '${escapeText(exp.title)}', ${exp.amount}, '${escapeText(exp.category)}', '${escapeText(exp.description || "")}')">Edit</button>
                        <button onclick="deleteExpense(${exp.id})">Delete</button>
                    </div>
                `;

                list.appendChild(div);
            });

            document.getElementById("pageInfo").innerText = `Page ${currentPage}`;
        }

        function escapeText(text) {
            return String(text).replace(/'/g, "\\'");
        }

        async function editExpense(id, oldTitle, oldAmount, oldCategory, oldDescription) {
            const title = prompt("Enter new title", oldTitle);
            const amount = prompt("Enter new amount", oldAmount);
            const category = prompt("Enter new category", oldCategory);
            const description = prompt("Enter new description", oldDescription);

            if (title === null || amount === null || category === null || description === null) {
                return;
            }

            const response = await fetch(`/expenses/${id}`, {
                method: "PUT",
                headers: authHeaders(),
                body: JSON.stringify({
                    title: title,
                    amount: parseFloat(amount),
                    category: category,
                    description: description
                })
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById("msg").innerHTML = "Expense Updated!";
                document.getElementById("msg").style.color = "green";
                loadExpenses();
                loadReport();
            } else {
                document.getElementById("msg").innerHTML = "Error: " + JSON.stringify(data);
                document.getElementById("msg").style.color = "red";
            }
        }

        async function deleteExpense(id) {
            const confirmDelete = confirm("Are you sure you want to delete this expense?");
            if (!confirmDelete) return;

            const response = await fetch(`/expenses/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById("msg").innerHTML = "Expense Deleted!";
                document.getElementById("msg").style.color = "green";
                loadExpenses();
                loadReport();
            } else {
                document.getElementById("msg").innerHTML = "Error: " + JSON.stringify(data);
                document.getElementById("msg").style.color = "red";
            }
        }

        async function loadReport() {
            const res = await fetch("/expenses/report", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const data = await res.json();

            const reportDiv = document.getElementById("reportSection");

            let html = `
                <div class="report-box">
                    <p><strong>Total Expenses:</strong> ${data.total_expenses}</p>
                    <p><strong>Total Amount:</strong> ₹${data.total_amount}</p>
                    <h3>Category Summary</h3>
            `;

            data.category_summary.forEach(item => {
                html += `<p>${item.category}: ₹${item.total}</p>`;
            });

            html += `</div>`;
            reportDiv.innerHTML = html;
        }

        async function nextPage() {
            const res = await fetch("/expenses/count", {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const countData = await res.json();

            const totalPages = Math.ceil(countData.total / limit);

            if (currentPage < totalPages) {
                currentPage++;
                loadExpenses();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadExpenses();
            }
        }
    </script>
</body>
</html>
